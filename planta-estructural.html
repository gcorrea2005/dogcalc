<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cubierta Metálica — Planta Estructural</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{color:#22d3ee;margin-bottom:2px;font-size:1.3rem}
.sub{color:#94a3b8;font-size:0.85rem;margin-bottom:20px}
svg{background:#0f172a;border:1px solid #1e293b;border-radius:10px;max-width:100%}
.leyenda{display:flex;gap:28px;margin-top:16px;font-size:0.8rem;color:#94a3b8;flex-wrap:wrap;justify-content:center}
.leyenda span{display:flex;align-items:center;gap:6px}
.leyenda .swatch{width:18px;height:4px;border-radius:2px;display:inline-block}
.leyenda .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
</style>
</head>
<body>

<h1>Cubierta Metálica — Planta Estructural</h1>
<p class="sub">Cerchas transición ejes B y C (1→4, 3×6.40m=19.20m) &bull; Cajones ejes 2,3 (A→D, 16.52m)</p>

<svg viewBox="0 0 1100 650" width="1100" height="650">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#64748b" stroke="none"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#fb923c" stroke="none"/>
    </marker>
    <marker id="arr-c" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#22d3ee" stroke="none"/>
    </marker>
  </defs>

  <g transform="translate(60,40)">

    <!-- ====== ESCALA ====== -->
    <!-- X (1→4): 3×6.40=19.20m → escala 1m=30px → 576px -->
    <!-- Z (A→D): 16.52m → escala 1m=30px → ~496px -->
    <!-- escala: 30px/m -->

    <!-- ====== EJES ====== -->
    <g stroke="#475569" stroke-width="1" stroke-dasharray="6,4" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="496"/>       <!-- 1 -->
      <line x1="192" y1="0" x2="192" y2="496"/>   <!-- 2 @6.40m -->
      <line x1="384" y1="0" x2="384" y2="496"/>   <!-- 3 @12.80m -->
      <line x1="576" y1="0" x2="576" y2="496"/>   <!-- 4 @19.20m -->
    </g>

    <g stroke="#475569" stroke-width="1" stroke-dasharray="6,4" opacity="0.5">
      <line x1="0" y1="0" x2="576" y2="0"/>         <!-- A @0m -->
      <line x1="0" y1="162" x2="576" y2="162"/>     <!-- B @5.40m -->
      <line x1="0" y1="322" x2="576" y2="322"/>     <!-- C @10.725m -->
      <line x1="0" y1="496" x2="576" y2="496"/>     <!-- D @16.52m -->
    </g>

    <!-- ====== ETIQUETAS EJES ====== -->
    <g fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">
      <text x="0" y="-14">1</text>
      <text x="192" y="-14">2</text>
      <text x="384" y="-14">3</text>
      <text x="576" y="-14">4</text>
      <text x="-22" y="5">A</text>
      <text x="-22" y="166">B</text>
      <text x="-22" y="326">C</text>
      <text x="-22" y="500">D</text>
    </g>

    <!-- ====== COLUMNAS PERIMETRALES ====== -->
    <g fill="#1e293b" stroke="#94a3b8" stroke-width="1.5">
      <!-- Eje A (borde) -->
      <circle cx="0" cy="0" r="7"/>     <circle cx="192" cy="0" r="7"/>
      <circle cx="384" cy="0" r="7"/>   <circle cx="576" cy="0" r="7"/>
      <!-- Eje D (borde) -->
      <circle cx="0" cy="496" r="7"/>   <circle cx="192" cy="496" r="7"/>
      <circle cx="384" cy="496" r="7"/> <circle cx="576" cy="496" r="7"/>
      <!-- Eje 1 (B y C) -->
      <circle cx="0" cy="162" r="7"/>   <circle cx="0" cy="322" r="7"/>
      <!-- Eje 4 (B y C) -->
      <circle cx="576" cy="162" r="7"/> <circle cx="576" cy="322" r="7"/>
    </g>

    <!-- ====== CAJÓN EJE 2 (A→D) ====== -->
    <g>
      <line x1="186" y1="0" x2="186" y2="496" stroke="#22d3ee" stroke-width="4" opacity="0.9"/>
      <line x1="198" y1="0" x2="198" y2="496" stroke="#22d3ee" stroke-width="4" opacity="0.9"/>
      <rect x="186" y="0" width="12" height="496" fill="rgba(6,182,212,0.08)" stroke="none"/>
    </g>

    <!-- ====== CAJÓN EJE 3 (A→D) ====== -->
    <g>
      <line x1="378" y1="0" x2="378" y2="496" stroke="#22d3ee" stroke-width="4" opacity="0.9"/>
      <line x1="390" y1="0" x2="390" y2="496" stroke="#22d3ee" stroke-width="4" opacity="0.9"/>
      <rect x="378" y="0" width="12" height="496" fill="rgba(6,182,212,0.08)" stroke="none"/>
    </g>

    <!-- ====== CERCHA TRANSICIÓN EJE B ====== -->
    <g>
      <line x1="0" y1="156" x2="576" y2="156" stroke="#fb923c" stroke-width="4" opacity="0.9"/>
      <line x1="0" y1="168" x2="576" y2="168" stroke="#fb923c" stroke-width="4" opacity="0.9"/>
      <rect x="0" y="156" width="576" height="12" fill="rgba(251,146,60,0.08)" stroke="none"/>
    </g>

    <!-- ====== CERCHA TRANSICIÓN EJE C ====== -->
    <g>
      <line x1="0" y1="316" x2="576" y2="316" stroke="#fb923c" stroke-width="4" opacity="0.9"/>
      <line x1="0" y1="328" x2="576" y2="328" stroke="#fb923c" stroke-width="4" opacity="0.9"/>
      <rect x="0" y="316" width="576" height="12" fill="rgba(251,146,60,0.08)" stroke="none"/>
    </g>

    <!-- ====== DIVISIONES DE MÓDULOS 6.40m EN TRANSICIONES ====== -->
    <!-- Líneas punteadas en cada transición marcando paneles @0.80m (c/24px) -->
    <!-- No las dibujo todas (serían 24/transición), solo marcas representativas -->

    <!-- ====== INTERSECCIONES ====== -->
    <g>
      <!-- Cajón 2 × Trans B -->
      <rect x="181" y="152" width="26" height="22" fill="rgba(251,146,60,0.25)" stroke="#fbbf24" stroke-width="1.5" rx="3"/>
      <text x="194" y="168" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="700">⨯</text>
      <!-- Cajón 2 × Trans C -->
      <rect x="181" y="312" width="26" height="22" fill="rgba(251,146,60,0.25)" stroke="#fbbf24" stroke-width="1.5" rx="3"/>
      <text x="194" y="328" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="700">⨯</text>
      <!-- Cajón 3 × Trans B -->
      <rect x="373" y="152" width="26" height="22" fill="rgba(251,146,60,0.25)" stroke="#fbbf24" stroke-width="1.5" rx="3"/>
      <text x="386" y="168" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="700">⨯</text>
      <!-- Cajón 3 × Trans C -->
      <rect x="373" y="312" width="26" height="22" fill="rgba(251,146,60,0.25)" stroke="#fbbf24" stroke-width="1.5" rx="3"/>
      <text x="386" y="328" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="700">⨯</text>
    </g>

    <!-- ====== MÓDULOS 6.40m EN DIRECCIÓN 1→4 ====== -->
    <g opacity="0.15">
      <!-- Módulo 1→2 -->
      <rect x="4" y="16" width="184" height="464" fill="none" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="96" y="490" fill="#fb923c" font-size="9" text-anchor="middle">módulo 6.40m</text>
      <!-- Módulo 2→3 -->
      <rect x="196" y="16" width="184" height="464" fill="none" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="288" y="490" fill="#fb923c" font-size="9" text-anchor="middle">módulo 6.40m</text>
      <!-- Módulo 3→4 -->
      <rect x="388" y="16" width="184" height="464" fill="none" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="480" y="490" fill="#fb923c" font-size="9" text-anchor="middle">módulo 6.40m</text>
    </g>

    <!-- ====== ÁREA CENTRAL SIN COLUMNAS ====== -->
    <rect x="210" y="178" width="156" height="128" fill="rgba(34,211,238,0.05)" stroke="none"/>
    <text x="288" y="238" fill="#22d3ee" font-size="28" text-anchor="middle" opacity="0.12" font-weight="800">CLARO</text>
    <text x="288" y="258" fill="#22d3ee" font-size="28" text-anchor="middle" opacity="0.12" font-weight="800">LIBRE</text>
    <text x="288" y="278" fill="#22d3ee" font-size="10" text-anchor="middle" opacity="0.35">sin columnas</text>

    <!-- ====== DIMENSIONES 1→4 ====== -->
    <line x1="0" y1="530" x2="192" y2="530" stroke="#64748b" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="96" y="545" fill="#64748b" font-size="10" text-anchor="middle">6.40 m</text>

    <line x1="192" y1="530" x2="384" y2="530" stroke="#fb923c" stroke-width="1" marker-start="url(#arr-o)" marker-end="url(#arr-o)"/>
    <text x="288" y="545" fill="#fb923c" font-size="10" text-anchor="middle">6.40 m</text>

    <line x1="384" y1="530" x2="576" y2="530" stroke="#64748b" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="480" y="545" fill="#64748b" font-size="10" text-anchor="middle">6.40 m</text>

    <line x1="0" y1="558" x2="576" y2="558" stroke="#94a3b8" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="288" y="575" fill="#94a3b8" font-size="11" text-anchor="middle" font-weight="600">L total = 3 × 6.40 = 19.20 m</text>

    <!-- ====== DIMENSIONES A→D ====== -->
    <line x1="-50" y1="0" x2="-50" y2="162" stroke="#64748b" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="-62" y="83" fill="#64748b" font-size="10" text-anchor="end" transform="rotate(-90,-62,83)">5.40 m</text>

    <line x1="-50" y1="162" x2="-50" y2="322" stroke="#22d3ee" stroke-width="1.5" marker-start="url(#arr-c)" marker-end="url(#arr-c)"/>
    <text x="-62" y="244" fill="#22d3ee" font-size="10" text-anchor="end" font-weight="600" transform="rotate(-90,-62,244)">5.325 m</text>

    <line x1="-50" y1="322" x2="-50" y2="496" stroke="#64748b" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="-62" y="411" fill="#64748b" font-size="10" text-anchor="end" transform="rotate(-90,-62,411)">5.795 m</text>

    <line x1="-70" y1="0" x2="-70" y2="496" stroke="#94a3b8" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="-85" y="250" fill="#94a3b8" font-size="11" text-anchor="end" font-weight="600" transform="rotate(-90,-85,250)">L cajón = 16.52 m</text>

    <!-- ====== ETIQUETAS ====== -->
    <g transform="translate(192,20)">
      <rect x="-78" y="-12" width="156" height="24" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
      <text x="0" y="4" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="600">CAJÓN EJE 2</text>
    </g>
    <g transform="translate(384,20)">
      <rect x="-78" y="-12" width="156" height="24" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
      <text x="0" y="4" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="600">CAJÓN EJE 3</text>
    </g>

    <g transform="translate(20,162)">
      <rect x="-80" y="-24" width="160" height="24" rx="4" fill="#0f172a" stroke="#fb923c" stroke-width="1" opacity="0.9"/>
      <text x="0" y="-5" fill="#fb923c" font-size="10" text-anchor="middle" font-weight="600">TRANSICIÓN EJE B</text>
    </g>
    <g transform="translate(20,322)">
      <rect x="-80" y="-24" width="160" height="24" rx="4" fill="#0f172a" stroke="#fb923c" stroke-width="1" opacity="0.9"/>
      <text x="0" y="-5" fill="#fb923c" font-size="10" text-anchor="middle" font-weight="600">TRANSICIÓN EJE C</text>
    </g>

    <g transform="translate(288,438)">
      <text x="0" y="0" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="500">⨯ 4 intersecciones — todas en nudos existentes</text>
      <text x="0" y="14" fill="#64748b" font-size="9" text-anchor="middle">Transición @0.80m &bull; Cajón: nudo 7 (5.40m), nudo 13 (10.725m)</text>
    </g>

  </g>

  <!-- ====== LEYENDA ====== -->
  <g transform="translate(60,610)">
    <line x1="0" y1="0" x2="960" y2="0" stroke="#1e293b" stroke-width="1"/>
    <text x="480" y="18" fill="#94a3b8" font-size="11" text-anchor="middle" font-weight="600">LEYENDA</text>
    <g transform="translate(0,28)">
      <span class="leyenda">
        <span><span class="swatch" style="background:#22d3ee"></span> Cajón Warren (eje 2 y 3)</span>
        <span><span class="swatch" style="background:#fb923c"></span> Cercha transición (ejes B y C)</span>
        <span><span class="dot" style="background:#1e293b;border:1.5px solid #94a3b8"></span> Columna perimetral</span>
        <span><span class="dot" style="background:transparent;border:1.5px solid #fbbf24"></span> ⨯ Intersección nuda</span>
        <span style="color:#22d3ee;opacity:0.5">▨ Claro libre central B-C × 2-3</span>
      </span>
    </g>
  </g>

</svg>
</body>
</html>
